name: Update Cal.com Screenshot

on:
  schedule:
    # Every Sunday at midnight PST (8 AM UTC)
    - cron: '0 8 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install sharp
        run: npm install --no-save sharp

      # Resolve the LOCAL pinned playwright (1.58.2) so the browser build
      # matches what require('playwright') expects. Running this before
      # npm ci pulled the latest playwright and a mismatched browser build,
      # which is why every scheduled run failed at chromium.launch().
      - name: Install Playwright Chromium (matched to local version)
        run: npx playwright install --with-deps chromium

      - name: Capture Cal.com screenshot
        run: |
          node << 'SCRIPT'
          const { chromium } = require('playwright');
          const sharp = require('sharp');
          const path = require('path');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({
              viewport: { width: 1280, height: 720 }
            });

            await page.goto('https://app.cal.com/generuss/discovery-call', {
              waitUntil: 'networkidle',
              timeout: 30000
            });

            // Wait for calendar grid to render
            await page.waitForTimeout(3000);

            const screenshot = await page.screenshot({ type: 'png' });
            await browser.close();

            // Convert to webp
            await sharp(screenshot)
              .webp({ quality: 80 })
              .toFile(path.join('public', 'images', 'cal-placeholder.webp'));

            console.log('Screenshot saved to public/images/cal-placeholder.webp');
          })();
          SCRIPT

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet public/images/cal-placeholder.webp 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/cal-placeholder.webp
          git commit -m "chore: update Cal.com booking screenshot"
          git push
